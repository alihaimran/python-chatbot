<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
.header { background: #16213e; padding: 16px 24px; border-bottom: 1px solid #333; }
.header h1 { font-size: 20px; color: #a78bfa; }
.messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.message { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
.user { background: #312e81; align-self: flex-end; }
.bot { background: #1e293b; align-self: flex-start; border: 1px solid #334; }
.input-area { padding: 16px; background: #16213e; border-top: 1px solid #333; display: flex; gap: 10px; }
input { flex: 1; background: #0f3460; border: 1px solid #444; color: #eee; padding: 12px 16px; border-radius: 8px; font-size: 14px; outline: none; }
button { background: #7c3aed; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
button:hover { background: #6d28d9; }
</style>
</head>
<body>
<div class="header"><h1>🤖 AI Chatbot</h1></div>
<div class="messages" id="messages">
  <div class="message bot">Assalam o Alaikum! Kuch bhi poochhain </div>
</div>
<div class="input-area">
  <input type="text" id="input" placeholder="Message likhain..." onkeydown="if(event.key==='Enter') send()">
  <button onclick="send()">Bhejo ➤</button>
</div>
<script>
const API = 'http://127.0.0.1:8000';
const session = 'sess_' + Math.random().toString(36).slice(2);

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  input.value = '';
  addMessage('...', 'bot', 'typing');
  fetch(API + '/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({session_id: session, message: text})
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById('typing').remove();
    addMessage(data.reply, 'bot');
  })
  .catch(() => {
    document.getElementById('typing').remove();
    addMessage('Error! Backend chal raha hai?', 'bot');
  });
}

function addMessage(text, role, id) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.textContent = text;
  if (id) div.id = id;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 9999;
}
</script>
</body>
</html>
